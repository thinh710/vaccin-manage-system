services:
  db:
    image: postgres:17
    container_name: vaccin_db
    environment:
      POSTGRES_DB: ${DB_NAME:-vaccin}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-vaccin}"]
      interval: 5s
      timeout: 5s
      retries: 20

  web:
    build:
      context: .
    container_name: vaccin_web
    depends_on:
      db:
        condition: service_healthy
    environment:
      SECRET_KEY: ${SECRET_KEY:-django-insecure-docker-dev-key}
      DEBUG: ${DEBUG:-True}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-127.0.0.1,localhost,0.0.0.0}
      TIME_ZONE: ${TIME_ZONE:-Asia/Ho_Chi_Minh}
      DB_ENGINE: ${DB_ENGINE:-django.db.backends.postgresql}
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_NAME: ${DB_NAME:-vaccin}
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    command: ["sh", "docker/entrypoint.sh"]

volumes:
  postgres_data:
